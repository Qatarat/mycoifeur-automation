appId: com.example.my_coiffeur
---
# Flow: Send a gift card to someone via WhatsApp

- launchApp:
    clearState: true

- waitForAnimationToEnd:
    timeout: 20000

# Conditionally dismiss location permission dialog
# (appears on fresh CI installs; absent locally once granted)
- runFlow:
    when:
      visible: "While using the app"
    commands:
      - tapOn:
          text: "While using the app"

# Country / language selection (cold start)
- tapOn:
    text: "Select your country"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: ".*Saudi Arabia.*"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Select your language"
    optional: true
- tapOn:
    text: "English"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- tapOn:
    text: "Skip"
    optional: true

# Login
- tapOn:
    text: "Login to your account"
    optional: true
- tapOn:
    text: ".*\\+966.*"
    optional: true
- tapOn:
    point: "50%, 13%"
- inputText: "Bangladesh"
- tapOn:
    text: ".*\\+880.*"
    optional: true
- inputText: "1316314566"
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- inputText: "1234"
- tapOn:
    text: "Verify"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000

# Find gift option
- tapOn:
    text: "Gift to someone you love"
    optional: true
- tapOn:
    text: "Gift Card"
    optional: true
- waitForAnimationToEnd

# Gift details form
- tapOn:
    text: "Enter recipient Name"
    optional: true
- inputText: "Ahmed Ali"

- tapOn:
    text: "Recipient Number"
    optional: true
- inputText: "509876543"

- tapOn:
    text: "Enter sender Name"
    optional: true
- inputText: "Test Sender"

- tapOn:
    text: "What do you want to say?"
    optional: true
- inputText: "Wishing you blessings from Mecca!"

# Choose relationship
- tapOn:
    text: "Choose Relationship"
    optional: true
- waitForAnimationToEnd
- tapOn:
    index: 0
    optional: true
- waitForAnimationToEnd

# Preview gift
- tapOn:
    text: "Preview"
    optional: true
- waitForAnimationToEnd

- takeScreenshot: gift_card_preview

# Save
- tapOn:
    text: "Save Gift Details"
    optional: true
- waitForAnimationToEnd

- takeScreenshot: gift_card_saved
