appId: com.example.my_coiffeur
---
# Flow: Launch as guest user → verify guest browsing works

- launchApp:
    clearState: true

- waitForAnimationToEnd:
    timeout: 20000

# Conditionally dismiss location permission dialog
# (appears on fresh CI installs; absent locally once granted)
- runFlow:
    when:
      visible: "While using the app"
    commands:
      - tapOn:
          text: "While using the app"

# Onboarding Skip — tap if visible
- tapOn:
    text: "Skip"
    optional: true

- waitForAnimationToEnd:
    timeout: 5000

# Try to proceed as Guest if there's a guest link, else skip onboarding takes us to discover
- tapOn:
    text: "Guest"
    optional: true

- tapOn:
    text: "Continue as Guest"
    optional: true

- waitForAnimationToEnd:
    timeout: 5000

# Verify guest can see discover search hint or browse nearby providers
- takeScreenshot: guest_user_home

# Verify login prompt appears when accessing protected feature (Book Now)
- tapOn:
    text: "Book Now"
    optional: true

- waitForAnimationToEnd:
    timeout: 3000

# Verify login gate shows up
- assertVisible:
    text: "User Login.*"

- takeScreenshot: guest_user_login_prompt
