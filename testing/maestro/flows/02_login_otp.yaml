appId: com.example.my_coiffeur
---
# Flow: User Login → Mobile number input → OTP verification → logged-in home

- launchApp:
    clearState: true

- waitForAnimationToEnd:
    timeout: 20000

# Skip onboarding if shown
- tapOn:
    text: "Skip"
    optional: true

- waitForAnimationToEnd:
    timeout: 5000

# Tap User Login
- tapOn:
    text: "User Login"

- waitForAnimationToEnd:
    timeout: 3000

# Select Bangladesh country code
- tapOn:
    text: "+966"
- inputText: "Bangladesh"
- tapOn:
    text: "Bangladesh"

# Tap Mobile Number field and input phone number
- tapOn:
    text: "Mobile Number"
- inputText: "1316314566"

# Agree to terms checkbox/link (if any)
- tapOn:
    text: "By continuing you agree"
    optional: true

# Send Verification Code
- tapOn:
    text: "Send Verification Code"

- waitForAnimationToEnd:
    timeout: 5000

# Enter OTP
- inputText: "1234"

# Verify Code
- tapOn:
    text: "Verify Code"
- tapOn:
    text: "Verify"
    optional: true

- waitForAnimationToEnd:
    timeout: 8000

- takeScreenshot: login_otp_success
