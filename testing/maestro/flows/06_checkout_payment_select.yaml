appId: com.example.my_coiffeur
---
# Flow: Choose Service → Choose Date & Time → Booking Summary → Payment method selection

- launchApp:
    clearState: true

- waitForAnimationToEnd:
    timeout: 20000

# Conditionally dismiss location permission dialog
# (appears on fresh CI installs; absent locally once granted)
- runFlow:
    when:
      visible: "While using the app"
    commands:
      - tapOn:
          text: "While using the app"

# Skip onboarding if shown
- tapOn:
    text: "Skip"
    optional: true

- waitForAnimationToEnd:
    timeout: 5000

# Tap User Login and login
- tapOn:
    text: "User Login.*"
- waitForAnimationToEnd:
    timeout: 3000

# Select Bangladesh country code
- tapOn:
    text: ".*\\+966.*"
- tapOn:
    point: "50%, 13%"
- inputText: "Bangladesh"
- tapOn:
    text: ".*\\+880.*"

- inputText: "1316314566"
- pressKey: Enter
- waitForAnimationToEnd:
    timeout: 5000
- inputText: "1234"
- tapOn:
    text: "Verify Code.*"
    optional: true
- tapOn:
    text: "Verify"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000

# Select provider
- tapOn:
    text: "Search for a service or provider"
    optional: true
- tapOn:
    text: "Search providers and services..."
    optional: true
- inputText: "Sarah"
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Sarah Beauty Studio"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

# Select a service and tap Book Now / Next
- tapOn:
    text: "Choose Service"
    optional: true
- tapOn:
    text: "Add"
    optional: true
- tapOn:
    text: "Book Now"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

# Choose Date and Time
- tapOn:
    text: "Choose Date and Time"
    optional: true
# Select first available time slot
- tapOn:
    text: "Available Times"
    optional: true
- tapOn:
    text: "Next"
    optional: true

- waitForAnimationToEnd:
    timeout: 5000

# Booking Summary page
- takeScreenshot: checkout_payment_selection

# Verify Credit Card option is available
- tapOn:
    text: "Credit card"
    optional: true

# Apply Promo Code (if exists)
- tapOn:
    text: "Redeem your Promo Code"
    optional: true
- tapOn:
    text: "Promo Code"
    optional: true
- inputText: "TEST10"
- tapOn:
    text: "Apply"
    optional: true

- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: checkout_promo_applied
