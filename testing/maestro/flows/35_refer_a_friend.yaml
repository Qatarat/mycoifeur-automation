appId: com.example.my_coiffeur
---
# Flow 35: Refer a Friend — copy referral code, share via WhatsApp / system share
# Covers: referral screen loads, code visible, copy tap, share CTA.

- launchApp:
    clearState: true

- waitForAnimationToEnd:
    timeout: 20000

# Skip onboarding
- tapOn:
    text: "Skip"
    optional: true

- waitForAnimationToEnd:
    timeout: 5000

# Login
- tapOn:
    text: "User Login"
    optional: true
- tapOn:
    text: "+966"
    optional: true
- inputText: "Bangladesh"
- tapOn:
    text: "Bangladesh"
- tapOn:
    text: "Mobile Number"
    optional: true
- inputText: "1316314566"
- tapOn:
    text: "Send Verification Code"
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- inputText: "1234"
- tapOn:
    text: "Verify Code"
    optional: true
- tapOn:
    text: "Verify"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000

# Open profile / account
- tapOn:
    text: "Profile"
    optional: true
- tapOn:
    text: "Account"
    optional: true

# Find Refer / Referral section
- tapOn:
    text: "Refer a Friend"
    optional: true
- tapOn:
    text: "Referral"
    optional: true
- tapOn:
    text: "Invite Friends"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

- takeScreenshot: referral_screen

# Copy referral code
- tapOn:
    text: "Copy"
    optional: true
- tapOn:
    text: "Copy Code"
    optional: true
- waitForAnimationToEnd:
    timeout: 1000

# Share the referral
- tapOn:
    text: "Share"
    optional: true
- tapOn:
    text: "Share with Friends"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

- takeScreenshot: referral_share_dialog

# Dismiss share sheet
- tapOn:
    text: "Cancel"
    optional: true
- pressKey: Back
- waitForAnimationToEnd:
    timeout: 1000

- takeScreenshot: referral_complete
