appId: com.example.my_coiffeur
---
# Flow 40: App Update Prompt — force-update dialog behaviour on older builds
# Covers: if the server signals a force-update, the dialog appears and blocks navigation.
# On a current build the dialog must NOT appear — this is a smoke check.

- launchApp:
    clearState: true

- waitForAnimationToEnd:
    timeout: 20000

# If a force-update dialog appears, tap Update (do NOT block test — tap optional)
- tapOn:
    text: "Update Now"
    optional: true
- tapOn:
    text: "Update"
    optional: true

- waitForAnimationToEnd:
    timeout: 5000

# Skip onboarding
- tapOn:
    text: "Skip"
    optional: true

- waitForAnimationToEnd:
    timeout: 5000

# Login
- tapOn:
    text: "User Login"
    optional: true
- tapOn:
    text: "+966"
    optional: true
- inputText: "Bangladesh"
- tapOn:
    text: "Bangladesh"
- tapOn:
    text: "Mobile Number"
    optional: true
- inputText: "1316314566"
- tapOn:
    text: "Send Verification Code"
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- inputText: "1234"
- tapOn:
    text: "Verify Code"
    optional: true
- tapOn:
    text: "Verify"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000

# Verify the app is usable after (no force-update on current build)
- assertVisible:
    text: "Home"
    optional: true

- takeScreenshot: app_update_check_complete
