appId: com.example.my_coiffeur
---
# Flow 40: App Update Prompt — force-update dialog behaviour on older builds
# Covers: if the server signals a force-update, the dialog appears and blocks navigation.
# On a current build the dialog must NOT appear — this is a smoke check.

- launchApp:
    clearState: true

- waitForAnimationToEnd:
    timeout: 20000

# Conditionally dismiss location permission dialog
# (appears on fresh CI installs; absent locally once granted)
- runFlow:
    when:
      visible: "While using the app"
    commands:
      - tapOn:
          text: "While using the app"

# If a force-update dialog appears, tap Update (do NOT block test — tap optional)
- tapOn:
    text: "Update Now"
    optional: true
- tapOn:
    text: "Update"
    optional: true

- waitForAnimationToEnd:
    timeout: 5000

# Skip onboarding
- tapOn:
    text: "Skip"
    optional: true

- waitForAnimationToEnd:
    timeout: 5000

# Login
- tapOn:
    text: "User Login.*"
    optional: true
- tapOn:
    text: ".*\\+966.*"
    optional: true
- tapOn:
    point: "50%, 13%"
- inputText: "Bangladesh"
- tapOn:
    text: ".*\\+880.*"
    optional: true
- inputText: "1316314566"
- pressKey: Enter
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- inputText: "1234"
- tapOn:
    text: "Verify Code.*"
    optional: true
- tapOn:
    text: "Verify"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000

# Verify the app is usable after (no force-update on current build)
- assertVisible:
    text: "Home.*"
    optional: true

- takeScreenshot: app_update_check_complete
