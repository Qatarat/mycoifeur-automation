appId: com.example.my_coiffeur
---
# Flow 34: Favourites — add provider to favourites, verify saved, remove
# Covers: heart/favourite icon tap, favourites list loads, remove favourite.

- launchApp:
    clearState: true

- waitForAnimationToEnd:
    timeout: 20000

# Skip onboarding
- tapOn:
    text: "Skip"
    optional: true

- waitForAnimationToEnd:
    timeout: 5000

# Login
- tapOn:
    text: "User Login"
    optional: true
- tapOn:
    text: "+966"
    optional: true
- inputText: "Bangladesh"
- tapOn:
    text: "Bangladesh"
- tapOn:
    text: "Mobile Number"
    optional: true
- inputText: "1316314566"
- tapOn:
    text: "Send Verification Code"
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- inputText: "1234"
- tapOn:
    text: "Verify Code"
    optional: true
- tapOn:
    text: "Verify"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000

# Browse to a service/provider
- tapOn:
    text: "Browse"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

# Tap heart/favourite icon on first result
- tapOn:
    text: "Favourite"
    optional: true
- tapOn:
    id: "favourite_button"
    optional: true
- tapOn:
    id: "heart_icon"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000

- takeScreenshot: favourite_added

# Navigate to Favourites list
- tapOn:
    text: "Favourites"
    optional: true
- tapOn:
    text: "Saved"
    optional: true
- tapOn:
    text: "Wishlist"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

- takeScreenshot: favourites_list

# Remove from favourites
- tapOn:
    text: "Remove"
    optional: true
- tapOn:
    id: "favourite_button"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000

- takeScreenshot: favourite_removed
