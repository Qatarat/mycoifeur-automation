appId: com.example.my_coiffeur
---
# Flow: Verify offline/no-internet error screen
# The CI emulator has no internet, so navigation should trigger the offline screen naturally.

- launchApp:
    clearState: true

- waitForAnimationToEnd:
    timeout: 20000

# Conditionally dismiss location permission dialog
# (appears on fresh CI installs; absent locally once granted)
- runFlow:
    when:
      visible: "While using the app"
    commands:
      - tapOn:
          text: "While using the app"

# Country / language selection (cold start)
- tapOn:
    text: "Select your country"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: ".*Saudi Arabia.*"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Select your language"
    optional: true
- tapOn:
    text: "English"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- tapOn:
    text: "Skip"
    optional: true
- waitForAnimationToEnd

# Trigger a network action
- tapOn:
    text: "Select a Service"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- takeScreenshot: no_internet_screen
