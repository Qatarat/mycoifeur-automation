appId: com.qatarat.app
---
# Flow: Verify offline/no-internet error screen shows correctly
# Note: toggle airplane mode manually before running this flow,
#       or use the runScript step if device supports it.

- launchApp

- waitForAnimationToEnd:
    timeout: 5000

- tapOn:
    text: "Skip"
    optional: true
- waitForAnimationToEnd

# Trigger a network action (load home)
- tapOn:
    text: "Select a Service"
    optional: true
- waitForAnimationToEnd

# With no network, should show no-internet screen
- assertVisible:
    text: "Oops, No Internet Connection"
    optional: true
- assertVisible:
    text: "Please check your connection and try again"
    optional: true

- takeScreenshot: no_internet_screen
