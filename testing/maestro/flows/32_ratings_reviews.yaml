appId: com.example.my_coiffeur
---
# Flow 32: Ratings & Reviews — submit star rating + text review after a completed service
# Covers: completed order detail → Rate → star tap → text → submit → thank you screen.

- launchApp:
    clearState: true

- waitForAnimationToEnd:
    timeout: 20000

# Conditionally dismiss location permission dialog
# (appears on fresh CI installs; absent locally once granted)
- runFlow:
    when:
      visible: "While using the app"
    commands:
      - tapOn:
          text: "While using the app"

# Skip onboarding
- tapOn:
    text: "Skip"
    optional: true

- waitForAnimationToEnd:
    timeout: 5000

# Login
- tapOn:
    text: "User Login.*"
    optional: true
- tapOn:
    text: ".*\\+966.*"
    optional: true
- tapOn:
    point: "50%, 13%"
- inputText: "Bangladesh"
- tapOn:
    text: ".*\\+880.*"
    optional: true
- inputText: "1316314566"
- pressKey: Enter
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- inputText: "1234"
- tapOn:
    text: "Verify Code.*"
    optional: true
- tapOn:
    text: "Verify"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000

# Navigate to orders → completed
- tapOn:
    text: "My Orders"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Completed"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000

- takeScreenshot: completed_orders_list

# Open first completed order
- tapOn:
    text: "Rate"
    optional: true
- tapOn:
    text: "Leave a Review"
    optional: true
- tapOn:
    text: "Rate Service"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

- takeScreenshot: rating_screen

# Tap 5 stars
- tapOn:
    text: "5"
    optional: true
- tapOn:
    id: "star_5"
    optional: true
- waitForAnimationToEnd:
    timeout: 1000

# Enter review text
- tapOn:
    text: "Write your review"
    optional: true
- tapOn:
    text: "Add a comment"
    optional: true
- inputText: "Excellent service, very satisfied with the experience!"
- waitForAnimationToEnd:
    timeout: 1000

# Submit
- tapOn:
    text: "Submit"
    optional: true
- tapOn:
    text: "Submit Review"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- takeScreenshot: rating_submitted
