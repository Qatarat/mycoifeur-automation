appId: com.example.my_coiffeur
---
# Flow 28: Booking Reschedule — change date/time on an existing confirmed booking
# Covers: My Orders / My Bookings → reschedule CTA → new slot → confirm change.

- launchApp:
    clearState: true

- waitForAnimationToEnd:
    timeout: 20000

# Skip onboarding
- tapOn:
    text: "Skip"
    optional: true

- waitForAnimationToEnd:
    timeout: 5000

# Login
- tapOn:
    text: "User Login"
    optional: true
- tapOn:
    text: "+966"
    optional: true
- inputText: "Bangladesh"
- tapOn:
    text: "Bangladesh"
- tapOn:
    text: "Mobile Number"
    optional: true
- inputText: "1316314566"
- tapOn:
    text: "Send Verification Code"
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- inputText: "1234"
- tapOn:
    text: "Verify Code"
    optional: true
- tapOn:
    text: "Verify"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000

# Navigate to My Orders / My Bookings
- tapOn:
    text: "My Orders"
    optional: true
- tapOn:
    text: "Bookings"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

- takeScreenshot: bookings_list

# Open first order
- tapOn:
    text: "Upcoming"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000

# Tap reschedule
- tapOn:
    text: "Reschedule"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

- takeScreenshot: reschedule_picker

# Pick a new date
- tapOn:
    text: "Tomorrow"
    optional: true
- tapOn:
    text: "Next Week"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000

# Confirm reschedule
- tapOn:
    text: "Confirm Reschedule"
    optional: true
- tapOn:
    text: "Confirm"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- takeScreenshot: reschedule_confirmed
