appId: com.example.my_coiffeur
---
# Flow 26: Home Feed — carousel scrolling, banner taps, featured providers
# Covers: home screen loads after login, hero carousel, featured provider cards,
#         category chips, pull-to-refresh, no crash on rapid scroll.

- launchApp:
    clearState: true

- waitForAnimationToEnd:
    timeout: 20000

# Conditionally dismiss location permission dialog
# (appears on fresh CI installs; absent locally once granted)
- runFlow:
    when:
      visible: "While using the app"
    commands:
      - tapOn:
          text: "While using the app"

# Skip onboarding if visible
- tapOn:
    text: "Skip"
    optional: true

- waitForAnimationToEnd:
    timeout: 5000

# Login
- tapOn:
    text: "User Login.*"
    optional: true
- tapOn:
    text: ".*\\+966.*"
    optional: true
- tapOn:
    point: "50%, 13%"
- inputText: "Bangladesh"
- tapOn:
    text: ".*\\+880.*"
    optional: true
- inputText: "1316314566"
- pressKey: Enter
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- inputText: "1234"
- tapOn:
    text: "Verify Code.*"
    optional: true
- tapOn:
    text: "Verify"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000

# Home screen should be visible
- assertVisible:
    text: "Home.*"
    optional: true

- takeScreenshot: home_feed_loaded

# Scroll down through the home feed
- scroll
- waitForAnimationToEnd:
    timeout: 2000

- scroll
- waitForAnimationToEnd:
    timeout: 2000

- takeScreenshot: home_feed_scrolled_down

# Scroll back up
- scroll
- waitForAnimationToEnd:
    timeout: 2000

# Tap the first visible featured provider / service card
- tapOn:
    text: "Book Now"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Back"
    optional: true

- takeScreenshot: home_feed_complete
