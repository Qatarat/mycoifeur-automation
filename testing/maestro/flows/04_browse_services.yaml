appId: com.example.my_coiffeur
---
# Flow: Browse services, provider selection, overview details

- launchApp:
    clearState: true

- waitForAnimationToEnd:
    timeout: 20000

# Conditionally dismiss location permission dialog
# (appears on fresh CI installs; absent locally once granted)
- runFlow:
    when:
      visible: "While using the app"
    commands:
      - tapOn:
          text: "While using the app"

# Onboarding Skip — tap if visible
- tapOn:
    text: "Skip"
    optional: true

- waitForAnimationToEnd:
    timeout: 5000

# Tap Search and enter search term
- tapOn:
    text: "Search for a service or provider"
    optional: true
- tapOn:
    text: "Search providers and services..."
    optional: true

- inputText: "Sarah"

- waitForAnimationToEnd:
    timeout: 3000

# Select provider from list
- tapOn:
    text: "Sarah Beauty Studio"
    optional: true
- tapOn:
    text: "Book Now"
    optional: true

- waitForAnimationToEnd:
    timeout: 3000

# View Overview details / service info
- assertVisible:
    text: "Overview.*"
    optional: true

- takeScreenshot: browse_services_complete
