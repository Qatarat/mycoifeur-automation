appId: com.example.my_coiffeur
---
# Flow: Splash → onboarding → role selection
# Note: give the app a full 20s to cold-boot on CI emulators

- launchApp:
    clearState: true

- waitForAnimationToEnd:
    timeout: 20000

# Conditionally dismiss location permission dialog
# (appears on fresh CI installs; absent locally once granted)
- runFlow:
    when:
      visible: "While using the app"
    commands:
      - tapOn:
          text: "While using the app"

# Onboarding Skip — tap if visible
- tapOn:
    text: "Skip"
    optional: true

- waitForAnimationToEnd:
    timeout: 5000

# Verify we reach role selection (User Login & Service Provider)
- assertVisible:
    text: "User Login.*"

- assertVisible:
    text: "Service Provider.*"

- takeScreenshot: splash_onboarding_complete
