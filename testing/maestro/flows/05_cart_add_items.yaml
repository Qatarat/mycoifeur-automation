appId: com.example.my_coiffeur
---
# Flow: Add services to booking list, verify state

- launchApp:
    clearState: true

- waitForAnimationToEnd:
    timeout: 20000

# Conditionally dismiss location permission dialog
# (appears on fresh CI installs; absent locally once granted)
- runFlow:
    when:
      visible: "While using the app"
    commands:
      - tapOn:
          text: "While using the app"

# Skip onboarding if shown
- tapOn:
    text: "Skip"
    optional: true

- waitForAnimationToEnd:
    timeout: 5000

# Tap User Login
- tapOn:
    text: "User Login.*"
- waitForAnimationToEnd:
    timeout: 3000

# Select Bangladesh country code
- tapOn:
    text: ".*\\+966.*"
- tapOn:
    point: "50%, 13%"
- inputText: "Bangladesh"
- tapOn:
    text: ".*\\+880.*"

# Enter phone number and login
- inputText: "1316314566"
- pressKey: Enter
- waitForAnimationToEnd:
    timeout: 5000
- inputText: "1234"
- tapOn:
    text: "Verify Code.*"
    optional: true
- tapOn:
    text: "Verify"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000

# Search for provider
- tapOn:
    text: "Search for a service or provider"
    optional: true
- tapOn:
    text: "Search providers and services..."
    optional: true
- inputText: "Sarah"
- waitForAnimationToEnd:
    timeout: 3000

# Select provider
- tapOn:
    text: "Sarah Beauty Studio"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

# Select a service (tap Choose Service or "+" next to service)
- tapOn:
    text: "Choose Service"
    optional: true
- tapOn:
    text: "Add"
    optional: true
- tapOn:
    text: "Book Now"
    optional: true

- waitForAnimationToEnd:
    timeout: 3000

# Verify selected services count shows at bottom
- takeScreenshot: cart_with_items
