appId: com.example.my_coiffeur
---
# Flow 29: Booking Cancel — cancel an in-progress/upcoming booking via dialog
# Covers: My Orders → cancel CTA → confirmation dialog → confirm cancel → status updated.

- launchApp:
    clearState: true

- waitForAnimationToEnd:
    timeout: 20000

# Conditionally dismiss location permission dialog
# (appears on fresh CI installs; absent locally once granted)
- runFlow:
    when:
      visible: "While using the app"
    commands:
      - tapOn:
          text: "While using the app"

# Skip onboarding
- tapOn:
    text: "Skip"
    optional: true

- waitForAnimationToEnd:
    timeout: 5000

# Login
- tapOn:
    text: "User Login.*"
    optional: true
- tapOn:
    text: ".*\\+966.*"
    optional: true
- tapOn:
    point: "50%, 13%"
- inputText: "Bangladesh"
- tapOn:
    text: ".*\\+880.*"
    optional: true
- inputText: "1316314566"
- pressKey: Enter
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- inputText: "1234"
- tapOn:
    text: "Verify Code.*"
    optional: true
- tapOn:
    text: "Verify"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000

# Navigate to My Orders
- tapOn:
    text: "My Orders"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

- takeScreenshot: orders_before_cancel

# Open first upcoming order
- tapOn:
    text: "Upcoming"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000

# Tap Cancel
- tapOn:
    text: "Cancel Order"
    optional: true
- tapOn:
    text: "Cancel Booking"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000

- takeScreenshot: cancel_dialog_shown

# Confirm cancellation dialog (press Yes / Confirm)
- tapOn:
    text: "Yes"
    optional: true
- tapOn:
    text: "Yes, Cancel"
    optional: true
- tapOn:
    text: "Confirm"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- takeScreenshot: booking_cancelled

# Verify order shows cancelled status
- assertVisible:
    text: "Cancelled.*"
    optional: true
