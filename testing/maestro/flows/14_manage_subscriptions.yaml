appId: com.example.my_coiffeur
---
# Flow: View active subscriptions, billing history, cancel subscription dialog

- launchApp:
    clearState: true

- waitForAnimationToEnd:
    timeout: 20000

# Conditionally dismiss location permission dialog
# (appears on fresh CI installs; absent locally once granted)
- runFlow:
    when:
      visible: "While using the app"
    commands:
      - tapOn:
          text: "While using the app"

# Country / language selection (cold start)
- tapOn:
    text: "Select your country"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: ".*Saudi Arabia.*"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Select your language"
    optional: true
- tapOn:
    text: "English"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- tapOn:
    text: "Skip"
    optional: true

# Login
- tapOn:
    text: "Login to your account"
    optional: true
- tapOn:
    text: ".*\\+966.*"
    optional: true
- tapOn:
    point: "50%, 13%"
- inputText: "Bangladesh"
- tapOn:
    text: ".*\\+880.*"
- inputText: "1316314566"
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- inputText: "1234"
- tapOn:
    text: "Verify"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000

# Navigate to subscriptions
- tapOn:
    text: "Active Subscription"
    optional: true
- tapOn:
    text: "Subscriptions"
    optional: true
- waitForAnimationToEnd

- takeScreenshot: active_subscriptions

# Billing history
- tapOn:
    text: "Billing History"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: billing_history

# Cancel subscription dialog — don't confirm
- tapOn:
    text: "Cancel Subscription"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "No"
    optional: true

- takeScreenshot: cancel_subscription_dialog
