appId: com.example.my_coiffeur
---
# Flow 31: Wallet / Balance — view balance, top-up options, transaction history
# Covers: wallet screen loads, balance visible, top-up entry, history list.

- launchApp:
    clearState: true

- waitForAnimationToEnd:
    timeout: 20000

# Conditionally dismiss location permission dialog
# (appears on fresh CI installs; absent locally once granted)
- runFlow:
    when:
      visible: "While using the app"
    commands:
      - tapOn:
          text: "While using the app"

# Skip onboarding
- tapOn:
    text: "Skip"
    optional: true

- waitForAnimationToEnd:
    timeout: 5000

# Login
- tapOn:
    text: "User Login.*"
    optional: true
- tapOn:
    text: ".*\\+966.*"
    optional: true
- tapOn:
    point: "50%, 13%"
- inputText: "Bangladesh"
- tapOn:
    text: ".*\\+880.*"
    optional: true
- inputText: "1316314566"
- pressKey: Enter
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- inputText: "1234"
- tapOn:
    text: "Verify Code.*"
    optional: true
- tapOn:
    text: "Verify"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000

# Navigate to Wallet
- tapOn:
    text: "Wallet"
    optional: true
- tapOn:
    text: "Balance"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

- takeScreenshot: wallet_screen

# Scroll to see transaction history
- scroll
- waitForAnimationToEnd:
    timeout: 2000

- takeScreenshot: wallet_history

# Tap Top Up / Add Funds
- tapOn:
    text: "Top Up"
    optional: true
- tapOn:
    text: "Add Funds"
    optional: true
- tapOn:
    text: "Recharge"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

- takeScreenshot: wallet_topup_options

# Go back without completing top-up
- tapOn:
    text: "Back"
    optional: true
- tapOn:
    text: "Cancel"
    optional: true

- takeScreenshot: wallet_complete
