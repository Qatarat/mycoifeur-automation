name: "Appium — Deep Tests (Android)"

on:
  schedule:
    - cron: "0 2 * * 1"    # every Monday at 02:00 UTC
  workflow_dispatch:
    inputs:
      marker:
        description: "pytest marker to run (payment | gift | subscription | streaming | leave empty for all)"
        required: false
        default: ""

concurrency:
  group: appium-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  appium-tests:
    name: Appium Deep Tests (Android API 33)
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: testing/appium/requirements.txt

      - name: Install Python deps
        run: pip install -r testing/appium/requirements.txt

      - name: Install Node & Appium
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Appium + drivers
        run: |
          npm install -g appium
          appium driver install uiautomator2
          appium driver install --source=npm appium-flutter-driver

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Start Appium server
        run: |
          appium --port 4723 --log /tmp/appium.log &
          sleep 5
          curl -s http://localhost:4723/status | python3 -c "import sys,json; d=json.load(sys.stdin); print('Appium ready:', d['value']['ready'])"

      - name: Run Appium Tests on Emulator
        uses: reactivecircus/android-emulator-runner@v2
        env:
          PLATFORM: android
          DEVICE_MODE: emulator
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_6
          target: google_apis
          force-avd-creation: false
          emulator-options: >
            -no-snapshot-save
            -no-window
            -gpu swiftshader_indirect
            -noaudio
            -no-boot-anim
          disable-animations: true
          script: |
            adb install -r "Qatarat (Lambda-Stage).apk"
            mkdir -p testing/appium/reports/screenshots
            MARKER="${{ github.event.inputs.marker }}"
            cd testing/appium
            if [ -n "$MARKER" ]; then
              echo "Running marker: $MARKER"
              python3 -m pytest tests/ -m "$MARKER" -v --html=reports/report.html --self-contained-html --tb=short -o "junit_family=xunit2" --junit-xml=reports/results.xml
            else
              echo "Running all Appium tests..."
              python3 -m pytest tests/ -v --html=reports/report.html --self-contained-html --tb=short -o "junit_family=xunit2" --junit-xml=reports/results.xml
            fi

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-html-report-${{ github.run_number }}
          path: testing/appium/reports/report.html
          retention-days: 30

      - name: Upload failure screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-screenshots-${{ github.run_number }}
          path: testing/appium/reports/screenshots/
          retention-days: 14

      - name: Upload Appium log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: appium-server-log-${{ github.run_number }}
          path: /tmp/appium.log
          retention-days: 7

      - name: Publish test summary
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Appium Test Results
          path: testing/appium/reports/results.xml
          reporter: java-junit
          fail-on-error: false
