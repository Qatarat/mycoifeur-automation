name: "Maestro — Smoke (Android)"

on:
  push:
    branches: [main, develop, "release/**"]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs on the same branch to save free minutes
concurrency:
  group: maestro-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke Tests (Android API 33)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Repo ────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true          # pull the APK via git-lfs

      # ── Java 17 ─────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── Maestro ─────────────────────────────────────────
      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      # ── Android Emulator ────────────────────────────────
      - name: Enable KVM (speeds up emulator)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Smoke Suite on Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_6
          target: google_apis
          force-avd-creation: false
          emulator-options: >
            -no-snapshot-save
            -no-window
            -gpu swiftshader_indirect
            -noaudio
            -no-boot-anim
          disable-animations: true
          script: |
            # Install APK
            adb install -r "Qatarat (Lambda-Stage).apk"

            # Run smoke suite
            maestro test testing/maestro/flows/suites/smoke.yaml \
              --format junit \
              --output testing/maestro/reports/smoke-results.xml

      # ── Reports ─────────────────────────────────────────
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-smoke-results-${{ github.run_number }}
          path: testing/maestro/reports/
          retention-days: 14

      - name: Upload Maestro screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-smoke-screenshots-${{ github.run_number }}
          path: ~/.maestro/tests/
          retention-days: 7

      - name: Publish test summary
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Maestro Smoke Results
          path: testing/maestro/reports/smoke-results.xml
          reporter: java-junit
          fail-on-error: false
